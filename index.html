<style>
:root {
  --navy: #0f2340; --navy2: #1e3a5f; --navy3: #2d5282;
  --green: #16a34a; --green-lt: #dcfce7;
  --blue: #2563eb; --blue-lt: #dbeafe;
  --amber: #d97706; --amber-lt: #fef3c7;
  --red: #dc2626; --red-lt: #fee2e2;
  --fede: #7c3aed; --fede-lt: #ede9fe;
  --dai: #db2777;  --dai-lt: #fce7f3;
  --surface: #f1f5f9; --card: #fff;
  --border: #e2e8f0; --text: #1e293b; --muted: #64748b;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;overscroll-behavior:none}

/* HEADER */
.header{background:linear-gradient(160deg,var(--navy) 0%,#1a2f5a 60%,var(--navy3) 100%);padding:calc(var(--safe-top) + 16px) 18px 18px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 0%,rgba(245,158,11,.12) 0%,transparent 60%);pointer-events:none}
.header-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.header-title{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;color:#fff;letter-spacing:-.5px}
.header-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.mes-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 13px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.9);cursor:pointer}

/* STATS GRID 2x2 */
.hstats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hstat{background:rgba(255,255,255,.07);border-radius:12px;padding:10px 12px;border:1px solid rgba(255,255,255,.08)}
.hstat-label{font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.45);text-transform:uppercase;margin-bottom:4px}
.hstat-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;line-height:1}

/* USUARIO PILLS */
.user-bar{display:flex;gap:8px;padding:12px 14px;background:var(--card);border-bottom:1px solid var(--border)}
.user-pill{flex:1;padding:8px;border-radius:12px;border:2px solid var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.user-pill.fede{border-color:var(--fede);background:var(--fede-lt);color:var(--fede)}
.user-pill.dai{border-color:var(--dai);background:var(--dai-lt);color:var(--dai)}
.user-pill.inactive{border-color:var(--border);background:none;color:var(--muted)}

/* MES SCROLLER */
.mes-scroll{display:flex;gap:6px;overflow-x:auto;padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border);scrollbar-width:none}
.mes-scroll::-webkit-scrollbar{display:none}
.mes-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.mes-btn.active{background:var(--navy);color:#fff}
.mes-btn:not(.active){background:var(--surface);color:var(--muted)}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.tab-btn{flex:1;padding:11px 4px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy)}

/* CONTENT */
.content{padding-bottom:calc(var(--safe-bot) + 60px)}

/* CARDS */
.card{background:var(--card);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin:12px 14px 0;padding:16px}
.card-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

/* WEEK PILLS */
.week-pills{display:flex;gap:8px;padding:10px 14px 0;flex-wrap:wrap}
.week-pill{padding:7px 16px;border-radius:22px;border:none;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s}
.week-pill.active{background:var(--navy);color:#fff;box-shadow:0 4px 12px rgba(15,35,64,.3)}
.week-pill:not(.active){background:var(--border);color:var(--text)}

/* STAT ROW */
.stat-row{display:flex;gap:8px;margin:10px 14px 0}
.stat-card{flex:1;background:var(--card);border-radius:14px;padding:11px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.stat-val{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;line-height:1}

/* PROGRESS */
.prog-wrap{background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}

/* SPLIT BAR - Fede vs Dai */
.split-bar-wrap{margin:10px 0}
.split-bar-track{height:12px;border-radius:99px;overflow:hidden;display:flex;background:var(--border);margin:6px 0}
.split-bar-fede{background:var(--fede);border-radius:99px 0 0 99px;transition:width .5s}
.split-bar-dai{background:var(--dai);border-radius:0 99px 99px 0;transition:width .5s}
.split-legend{display:flex;justify-content:space-between;font-size:12px}
.split-legend-item{display:flex;align-items:center;gap:5px}
.split-dot{width:8px;height:8px;border-radius:50%}

/* FORM */
.form-input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:11px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--surface);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--navy3);background:#fff}
.form-row{display:flex;gap:8px;margin-top:8px}
.cat-select{flex:1;padding:11px 13px;border:1.5px solid var(--border);border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--surface);color:var(--text);outline:none;appearance:none;cursor:pointer}
.add-btn{width:100%;margin-top:10px;padding:13px;background:linear-gradient(135deg,var(--navy2),var(--navy));color:#fff;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(15,35,64,.25);transition:transform .15s,opacity .15s;-webkit-appearance:none}

.add-btn:disabled{opacity:.5;pointer-events:none}

.gasto-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--surface)}
.gasto-row:last-child{border-bottom:none}
.cat-dot{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0}
.gasto-info{flex:1;min-width:0}
.gasto-desc{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gasto-meta{font-size:11px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px}
.user-badge{display:inline-flex;align-items:center;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:700}
.gasto-monto{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--navy);white-space:nowrap}
.del-btn{background:none;border:none;color:#cbd5e1;font-size:15px;cursor:pointer;padding:2px 4px;flex-shrink:0}
.del-btn:active{color:var(--red)}

/* AHORRO */
.ahorro-card{margin:12px 14px 0;padding:20px;background:linear-gradient(140deg,var(--navy) 0%,#1a3060 50%,var(--navy3) 100%);border-radius:18px;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(15,35,64,.35)}
.ahorro-card::after{content:'💰';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:52px;opacity:.12}
.ahorro-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px}
.ahorro-val{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:#86efac}
.ahorro-pct{font-size:14px;color:rgba(255,255,255,.7);margin-top:4px}
.ahorro-split{display:flex;gap:16px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)}
.ahorro-split-item{font-size:12px;color:rgba(255,255,255,.65)}
.ahorro-split-item span{font-weight:700;color:rgba(255,255,255,.9);display:block;font-size:14px}

/* GUIA */
.guia-cat{border-radius:14px;padding:14px;margin-bottom:10px}
.guia-tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.rutina-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--surface);align-items:flex-start}
.warn-card{background:#fefce8;border:1px solid #fde047;border-radius:14px;padding:14px;margin:12px 14px 0}

/* SYNC STATUS */
.sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;background:var(--card);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}

.sync-dot.ok{background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.err{background:var(--red)}

/* MODAL MES */
.modal-overlay{position:fixed;inset:0;background:rgba(15,35,64,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-bot) + 20px);width:100%;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px}
.mes-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mes-option{padding:10px 6px;border-radius:12px;border:1.5px solid var(--border);background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mes-option.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-bot) + 80px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:30px;color:var(--muted);font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--navy2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:28px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:34px;margin-bottom:8px}

<script>
// Genera íconos PNG reales con emoji 💰 para Android PWA
(function() {
  function makeIcon(size) {
    try {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      // Fondo navy
      ctx.fillStyle = '#0f2340';
      const r = size * 0.15;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();
      // Emoji bolsa de dinero
      ctx.font = (size * 0.58) + 'px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💰', size / 2, size / 2 + size * 0.04);
      return c.toDataURL('image/png');
    } catch(e) { return null; }
  }
  window.addEventListener('load', () => {
    // Actualizar links del manifest con íconos generados dinámicamente
    const i192 = makeIcon(192);
    const i512 = makeIcon(512);
    if (!i192 || !i512) return;
    // Parchear el manifest con blob URLs de los íconos reales
    try {
      const mf = {
        name: "Control de Varios",
        short_name: "Varios 💰",
        start_url: "/varios-app/",
        scope: "/varios-app/",
        display: "standalone",
        background_color: "#0f2340",
        theme_color: "#0f2340",
        orientation: "portrait",
        icons: [
          { src: i192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
          { src: i512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
        ]
      };
      const blob = new Blob([JSON.stringify(mf)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      let link = document.querySelector('link[rel="manifest"]');
      if (!link) { link = document.createElement('link'); link.rel = 'manifest'; document.head.appendChild(link); }
      link.href = url;
    } catch(e) {}
    // Apple touch icon
    const appleLink = document.querySelector('link[rel="apple-touch-icon"]');
    if (appleLink) appleLink.href = i192;
  });
})();
</script>

// ══════════════════════════════════════════════════════
// API calls al Apps Script proxy

async function apiGet(params) {
  if (!APPS_SCRIPT_URL) throw new Error('URL no configurada');
  const url = APPS_SCRIPT_URL + '?' + new URLSearchParams(params);
  let r;
  try {
    r = await fetch(url, { redirect: 'follow' });
  } catch(e) {
    throw new Error('Sin conexión: ' + e.message);
  }
  if (!r.ok) throw new Error('HTTP ' + r.status + ' — verificá el deploy del script');
  let d;
  try { d = await r.json(); } catch(e) { throw new Error('Respuesta inválida del script'); }
  if (d.error) throw new Error(d.error);
  return d;
}

async function apiPost(body) {
  if (!APPS_SCRIPT_URL) throw new Error('URL no configurada');
  let r;
  try {
    r = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'}, // Apps Script requiere text/plain para evitar CORS preflight
      body: JSON.stringify(body),
      redirect: 'follow',
    });
  } catch(e) {
    throw new Error('Sin conexión: ' + e.message);
  }
  if (!r.ok) throw new Error('HTTP ' + r.status);
  let d;
  try { d = await r.json(); } catch(e) { throw new Error('Respuesta inválida'); }
  if (d.error) throw new Error(d.error);
  return d;
}

// ══════════════════════════════════════════════════════
// SYNC
// ══════════════════════════════════════════════════════
function preservarForm() {
  const desc = document.getElementById('inp-desc');
  const cat = document.getElementById('inp-cat');
  const monto = document.getElementById('inp-monto');
  return {
    desc: desc ? desc.value : '',
    cat: cat ? cat.value : 'A',
    monto: monto ? monto.value : '',
    focused: document.activeElement ? document.activeElement.id : null,
  };
}
function restaurarForm(saved) {
  if (!saved) return;
  const desc = document.getElementById('inp-desc');
  const cat = document.getElementById('inp-cat');
  const monto = document.getElementById('inp-monto');
  if (desc && saved.desc) desc.value = saved.desc;
  if (cat && saved.cat) cat.value = saved.cat;
  if (monto && saved.monto) monto.value = saved.monto;
  if (saved.focused) {
    const el = document.getElementById(saved.focused);
    if (el) el.focus();
  }
}

async function syncLoad(silent=false) {
  try {
    if (!silent) { syncStatus = 'syncing'; renderSyncBar(); }
    const formState = silent ? preservarForm() : null;
    if (!silent || !window._syncCount) window._syncCount = 0;
    window._syncCount++;
    if (window._syncCount % 5 === 1) cargarPresupuestosPorMes().catch(()=>{});
    gastos = await sheetsRead();
    syncStatus = 'ok';
    lastSync = new Date();
    if (silent && formState && (formState.desc || formState.monto || formState.focused)) {
      renderSyncBar();
      return;
    }
    render();
    if (formState) restaurarForm(formState);
  } catch(e) {
    console.error('Sync error:', e);
    const msg = String(e).toLowerCase();
    if (msg.includes('url no configurada') || !APPS_SCRIPT_URL) {
      syncStatus = 'setup';
    } else {
      syncStatus = 'err';
      console.error('Sync error completo:', e);
      if (!silent) showToast('⚠️ ' + String(e).slice(0,80));
    }
    renderSyncBar();
  }
}

function startAutoSync() {
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(() => syncLoad(true), 15000); // cada 15s
}

function renderSyncBar() {
  const el = document.getElementById('sync-bar');
  if (!el) return;
  if (syncStatus === 'setup' || !APPS_SCRIPT_URL) {
    el.innerHTML = `<div class="sync-dot err"></div><span style="color:var(--red);font-weight:600">Falta configurar URL</span><button onclick="mostrarSetup()" style="margin-left:auto;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit">⚙️ Configurar</button>`;
    return;
  }
  const labels = { ok: lastSync ? `✓ ${lastSync.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}` : 'Conectado', syncing:'Sincronizando...', err:'Error — tocá ↺' };
  el.innerHTML = `<div class="sync-dot ${syncStatus}"></div><span style="color:${syncStatus==='err'?'var(--red)':''}">${labels[syncStatus]||''}</span><button onclick="syncLoad()" style="margin-left:auto;background:${syncStatus==='err'?'var(--red)':'none'};color:${syncStatus==='err'?'#fff':'var(--muted)'};border:none;border-radius:${syncStatus==='err'?'8px':'0'};padding:${syncStatus==='err'?'4px 10px':'0'};cursor:pointer;font-size:11px;font-weight:${syncStatus==='err'?'600':'400'};font-family:inherit">↺ Reintentar</button>`;
}

function mostrarSetup() {
  const url = prompt('Pegá la URL de tu Apps Script Web App:');
  if (url && url.includes('script.google.com')) {
    setAppsScriptUrl(url);
    syncLoad(false);
  } else if (url) {
    alert('URL inválida. Debe ser de script.google.com');
  }
}

const fmt = n => (n<0?'-$':'$') + Math.abs(Math.round(n)).toLocaleString('es-AR');
const pct = (v,t) => t>0 ? Math.min(100,Math.round(v/t*100)) : 0;

function filtrar(mes, sem, usuario=null) {
  return gastos.filter(g => g.mes===mes && g.semana===sem && (!usuario || g.usuario===usuario));
}
function filtrarMes(mes, usuario=null) {
  return gastos.filter(g => g.mes===mes && (!usuario || g.usuario===usuario));
}
function totalOf(arr) { return arr.reduce((a,g)=>a+g.monto,0); }

async function addGasto() {
  if (!usuarioActivo) { showToast('⚠️ Primero seleccioná quién sos'); return; }
  const desc = document.getElementById('inp-desc').value.trim();
  const cat = document.getElementById('inp-cat').value;
  const monto = parseFloat(document.getElementById('inp-monto').value.replace(/\./g,'').replace(',','.'));
  if (isNaN(monto) || monto<=0) { showToast('⚠️ Ingresá el monto'); return; }

  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  const descFinal = desc || (cat==='A'?'Esencial':cat==='B'?'Personal':'Extra');
  const g = { id: Date.now().toString(), usuario: usuarioActivo, mes: mesActivo, semana: semActiva, desc: descFinal, cat, monto, fecha: new Date().toLocaleDateString('es-AR') };

  try {
    await sheetsAppend(g);
    gastos.push(g);
    document.getElementById('inp-desc').value = '';
    document.getElementById('inp-monto').value = '';
    showToast(`✅ ${fmt(monto)} guardado`);
    render();
  } catch(e) {
    showToast('❌ Error al guardar. Reintentando...');
    console.error(e);
    // Reintentar login y guardar
    accessToken = null;
    try {
      await sheetsAppend(g);
      gastos.push(g);
      document.getElementById('inp-desc').value='';
      document.getElementById('inp-monto').value='';
      showToast(`✅ ${fmt(monto)} guardado`);
      render();
    } catch(e2) { showToast('❌ No se pudo guardar'); }
  } finally {
    const b2 = document.getElementById('add-btn');
    if(b2){ b2.disabled=false; b2.textContent='Registrar gasto'; }
  }
}

async function delGasto(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  try {
    syncStatus='syncing'; renderSyncBar();
    await sheetsDelete(id);
    gastos = gastos.filter(g => g.id !== String(id) && g.id !== id);
    syncStatus='ok'; lastSync=new Date();
    showToast('🗑 Gasto eliminado');
    render();
  } catch(e) {
    syncStatus='err'; renderSyncBar();
    showToast('❌ Error al eliminar');
  }
}

// ── SEMANA ──
function renderSemana(gs, totSem, saldoSem, totFedeSem, totDaiSem) {
  // ═══ Exceso equitativo — descuento FIJO para todas las semanas siguientes ═══
  // Por cada semana con exceso, ese exceso se divide entre las semanas que
  // quedaban EN ESE MOMENTO. Ese cociente es el descuento fijo que se aplica
  // igual a TODAS las semanas siguientes (sem 3, 4 y 5 reciben el mismo tope).
  const TOTAL_SEMANAS = 5;
  let descuentoFijo = 0;
  const SM_mes = presupuestoSemanal(mesActivo);
  for (let s = 1; s < semActiva; s++) {
    const totS = totalOf(filtrar(mesActivo, s));
    if (totS > SM_mes) {
      // Cuando ocurrió el exceso en sem s, quedaban (TOTAL_SEMANAS - s) semanas
      const semsQuedaban = TOTAL_SEMANAS - s;
      if (semsQuedaban > 0) descuentoFijo += Math.round((totS - SM_mes) / semsQuedaban);
    }
  }
  const semanalMes = SM_mes;
  const topeSem  = Math.max(0, semanalMes - descuentoFijo);
  const topeFede = Math.max(0, topeSem / 2);
  const topeDai  = Math.max(0, topeSem / 2);
  saldoSem = topeSem - totSem;
  const ajustePareja = descuentoFijo;
  const ajusteFede   = Math.round(descuentoFijo / 2);
  const ajusteDai    = Math.round(descuentoFijo / 2);
  const excesoAcumulado = descuentoFijo; // para display en mensaje
  const sobraFede = topeFede - totFedeSem;
  const sobraDai  = topeDai  - totDaiSem;
  const pctSem = pct(totSem, topeSem || 1);
  const barColor = totSem>topeSem?'var(--red)':totSem>topeSem*.8?'#f59e0b':'var(--green)';
  const pctFede = totSem>0?pct(totFedeSem,totSem):50;
  const pctDai = 100-pctFede;

  return `
    <div class="week-pills">
      ${[1,2,3,4,5].map(s=>`<button class="week-pill ${s===semActiva?'active':''}" onclick="setSem(${s})">Sem ${s}</button>`).join('')}
    </div>

    <!-- STATS SEMANA -->

      <div class="stat-card" style="border:2px solid var(--fede);background:linear-gradient(135deg,var(--fede-lt) 0%,#fff 100%);padding:16px 14px">
        <div style="font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--fede);text-transform:uppercase;margin-bottom:8px">👤 Fede · le queda</div>
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;color:${(topeFede-totFedeSem)<0?'var(--red)':'var(--fede)'}">${fmt(Math.max(0,topeFede-totFedeSem))}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.3">Gastó ${fmt(totFedeSem)} de ${fmt(topeFede)}${ajusteFede>0?`<br><span style="color:var(--amber);font-weight:600">−${fmt(ajusteFede)}/sem por exceso pareja</span>`:''}</div>
      </div>
      <div class="stat-card" style="border:2px solid var(--dai);background:linear-gradient(135deg,var(--dai-lt) 0%,#fff 100%);padding:16px 14px">
        <div style="font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--dai);text-transform:uppercase;margin-bottom:8px">👤 Dai · le queda</div>
        <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;color:${(topeDai-totDaiSem)<0?'var(--red)':'var(--dai)'}">${fmt(Math.max(0,topeDai-totDaiSem))}</div>

      </div>
    </div>

    <!-- TOTAL PAREJA (resumen abajo) -->
    <div class="stat-row">
      <div class="stat-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase">💑 Total pareja</div>
            <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:${totSem>topeSem?'var(--red)':'var(--navy)'};margin-top:2px">${fmt(totSem)} <span style="font-size:13px;color:var(--muted);font-weight:600">de ${fmt(topeSem)}</span></div>
          </div>
          <div style="text-align:right">
            <div style="font-size:10px;color:var(--muted)">Queda</div>
            <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:${saldoSem<0?'var(--red)':'var(--green)'}">${fmt(saldoSem)}</div>
          </div>

    <!-- BARRA PROGRESO TOTAL -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px">

        <div class="split-bar-track">
          <div class="split-bar-fede" style="width:${pctFede}%"></div>
          <div class="split-bar-dai" style="width:${pctDai}%"></div>

            <div class="split-dot" style="background:var(--fede)"></div>

            <span style="font-size:11px;color:var(--muted)">(${pctFede}%)</span>
          </div>

            <div class="split-dot" style="background:var(--dai)"></div>

      <div style="display:flex;align-items:center;gap:14px">
        <div style="font-size:38px">💰</div>

          <div style="font-size:10px;color:rgba(255,255,255,.75);margin-top:6px;line-height:1.4">Transferí este monto al ahorro 💵 · No se acumula a la próxima semana</div>
        </div>

    </div>` : ''}

    <!-- FORM -->
    <div class="card">
      <div class="card-label" style="display:flex;align-items:center;gap:6px">
        ➕ Agregar como
        <span style="font-weight:700;color:${usuarioActivo==='fede'?'var(--fede)':'var(--dai)'}">${usuarioActivo==='fede'?'Fede':'Dai'}</span>
      </div>
      <input class="form-input" id="inp-desc" placeholder="Descripción (opcional)"
        >
      <div class="form-row">
        <select class="cat-select" id="inp-cat">
          <option value="A">A · Esenciales</option>
          <option value="B">B · Personal</option>
          <option value="C">C · Extras</option>
        </select>
        <input class="form-input" id="inp-monto" placeholder="Monto $" type="number" inputmode="decimal" style="flex:1"
          onkeydown="if(event.key==='Enter')addGasto()">
      </div>
      <button class="add-btn" id="add-btn" onclick="addGasto()">Registrar gasto</button>
    </div>

    <!-- LISTA -->
    ${gs.length>0?`
    <div class="card">
      <div class="card-label">Gastos semana ${semActiva} · ${gs.length} registros</div>
      ${gs.slice().reverse().map(g=>`
        <div class="gasto-row">
          <div class="cat-dot" style="background:${CATS[g.cat]?.bg||'#f3f4f6'};color:${CATS[g.cat]?.color||'#374151'}">${g.cat}</div>
          <div class="gasto-info">
            <div class="gasto-desc">${g.desc}</div>
            <div class="gasto-meta">
              <span class="user-badge" style="background:${g.usuario==='fede'?'var(--fede-lt)':'var(--dai-lt)'};color:${g.usuario==='fede'?'var(--fede)':'var(--dai)'}">
                ${g.usuario==='fede'?'Fede':'Dai'}
              </span>
              ${g.fecha}
            </div>
          </div>
          <div class="gasto-monto">${fmt(g.monto)}</div>
          ${g.usuario===usuarioActivo?`<button class="del-btn" onclick="delGasto('${g.id}')">✕</button>`:'<div style="width:22px"></div>'}
        </div>
      `).join('')}
    </div>
    `:`<div class="empty"><div class="empty-icon">📝</div>Sin gastos esta semana</div>`}
  `;
}

function setSem(s) {
  semActiva=s;
  localStorage.setItem('ultima_sem', s);
  render();
}

// ── MES ──
function renderMes(gm, totMes, saldoMes, ahorroProy, pctAhorro, totFede, totDai) {
  const pctMes = pct(totMes, presupuestoActual);
  const totCat = {A:0,B:0,C:0};
  gm.forEach(g=>{totCat[g.cat]=(totCat[g.cat]||0)+g.monto;});

  const pctF = totMes>0?pct(totFede,totMes):50;
  const pctD = 100-pctF;

  const catBars = ['A','B','C'].map(c=>{
    const cat=CATS[c], g=totCat[c]||0, t=presupuestoActual*cat.tope, p=pct(g,t), over=g>t;
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span style="font-weight:700;color:${cat.color}">${c}: ${cat.label}</span>
        <span style="color:${over?'var(--red)':'var(--muted)'}">
          ${fmt(g)} / ${fmt(t)} ${over?'⚠️':''}
        </span>
      </div>
      <div class="prog-wrap" style="height:8px">
        <div class="prog-fill" style="width:${p}%;background:${over?'var(--red)':cat.color}"></div>
      </div>
    </div>`;
  }).join('');

  const semRows = [1,2,3,4,5].map(s=>{
    const _sem=getSEMANAL(); const gs=filtrar(mesActivo,s), tot=totalOf(gs), p=pct(tot,_sem);
    const gF=totalOf(filtrar(mesActivo,s,'fede')), gD=totalOf(filtrar(mesActivo,s,'dai'));
    const pF=tot>0?pct(gF,tot):0, pD=tot>0?pct(gD,tot):0;
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span style="font-weight:600">Semana ${s}</span>
        <span style="color:${tot>_sem?'var(--red)':'var(--muted)'};font-weight:600">${fmt(tot)}</span>
      </div>
      <div class="prog-wrap" style="height:7px;margin-bottom:6px">
        <div class="prog-fill" style="width:${p}%;background:${tot>_sem?'var(--red)':'var(--navy2)'}"></div>
      </div>
      ${tot>0?`<div class="split-bar-track" style="height:5px;border-radius:99px">
        <div style="width:${pF}%;background:var(--fede);border-radius:99px 0 0 99px"></div>
        <div style="width:${pD}%;background:var(--dai);border-radius:0 99px 99px 0"></div>
      </div>`:''}
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-label">Resumen ${MESES[mesActivo]}</div>
      <div style="display:flex;gap:14px;margin-bottom:14px">
        <div><div style="font-size:11px;color:var(--muted)">Presupuesto</div><div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800">${fmt(presupuestoActual)}</div></div>
        <div><div style="font-size:11px;color:var(--muted)">Gastado</div><div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:${totMes>presupuestoActual?'var(--red)':'var(--navy)'}">${fmt(totMes)}</div></div>
        <div><div style="font-size:11px;color:var(--muted)">Saldo</div><div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:${saldoMes<0?'var(--red)':'var(--green)'}">${fmt(saldoMes)}</div></div>
      </div>
      <div class="prog-wrap" style="height:10px">
        <div class="prog-fill" style="width:${pctMes}%;background:${totMes>presupuestoActual?'var(--red)':'var(--navy)'}"></div>
      </div>
      <div style="text-align:right;font-size:12px;color:var(--muted);margin-top:4px">${pctMes}% · ${fmt(presupuestoActual)}</div>
    </div>

    <!-- SPLIT MENSUAL FEDE vs DAI -->
    ${totMes>0?`
    <div class="card">
      <div class="card-label">Fede vs Dai — mes completo</div>
      <div class="split-bar-track" style="height:14px;margin-bottom:10px">
        <div style="width:${pctF}%;background:var(--fede);border-radius:${pctD>0?'99px 0 0 99px':'99px'}"></div>
        <div style="width:${pctD}%;background:var(--dai);border-radius:${pctF>0?'0 99px 99px 0':'99px'}"></div>
      </div>
      <div style="display:flex;justify-content:space-between">
        <div style="text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--fede)">${fmt(totFede)}</div>
          <div style="font-size:11px;color:var(--muted)">Fede · ${pctF}%</div>
        </div>
        <div style="text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--dai)">${fmt(totDai)}</div>
          <div style="font-size:11px;color:var(--muted)">Dai · ${pctD}%</div>
        </div>
      </div>
    </div>`:''}

    <!-- CATEGORÍAS -->
    <div class="card">
      <div class="card-label">Distribución A · B · C</div>
      ${catBars}
    </div>

    <!-- AHORRO -->
    <div class="ahorro-card">
      <div class="ahorro-label">Ahorro proyectado</div>
      <div class="ahorro-val">${fmt(ahorroProy)}</div>
      <div class="ahorro-pct">${pctAhorro}% del ingreso neto</div>
      <div class="ahorro-split">
        <div class="ahorro-split-item"><span>${fmt(ahorroProy*.7)}</span>70% → USD</div>
        <div class="ahorro-split-item"><span>${fmt(ahorroProy*.3)}</span>30% → Fondo MM</div>
      </div>
    </div>

    <!-- SEMANAS -->
    <div class="card">
      <div class="card-label">Semana a semana</div>
      ${semRows}
    </div>
  `;
}

// ── GUÍA ──
function renderGuia() {
  const ejemplos = {
    A:['Supermercado','Farmacia','Nafta/transporte','Verdulería','Médico'],
    B:['Ropa','Calzado','Artículos hogar','Regalos','Librería'],
    C:['Salida a comer','Delivery','Café','Cine','Imprevistos'],
  };
  const catCards = Object.entries(CATS).map(([k,v])=>`
    <div class="guia-cat" style="background:${v.bg};border-left:4px solid ${v.color}">
      <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:${v.color};margin-bottom:4px">
        ${k}: ${v.label} — ${Math.round(v.tope*100)}% (${fmt(getPRESUPUESTO()*v.tope)}/mes)
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">
        ${ejemplos[k].map(e=>`<span class="guia-tag" style="background:#fff;border:1px solid ${v.color}33;color:${v.color}">${e}</span>`).join('')}
      </div>
    </div>
  `).join('');

  return `
    <div class="card">
      <div class="card-label">Categorías A · B · C</div>
      ${catCards}
    </div>
    <div class="card">
      <div class="card-label">💬 Regla del WhatsApp</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5">Cuando mandan el gasto, agregan la letra al final. Después lo cargan acá.</p>
      ${['"Coto $8.500 A"','"Zapatillas Cata $12.000 B"','"Jaya cena $15.000 C"'].map(e=>`<div style="font-family:monospace;background:var(--surface);padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:14px;color:var(--navy)">${e}</div>`).join('')}
    </div>
    <div class="card">
      <div class="card-label">📅 Rutina</div>
      ${[['🟢 Lun–Vie','Gastan y registran acá al momento (o del WhatsApp)'],['🔵 Domingo','Revisan el saldo de la semana juntos'],['💛 Fin de mes','Si sobra → 70% USD + 30% Fondo MM'],['🔴 Si se pasan','Bajan gasto C primero, luego B']].map(([d,t])=>`
        <div class="rutina-row"><span style="font-size:12px;font-weight:700;min-width:80px">${d}</span><span style="font-size:13px;color:var(--muted);flex:1;line-height:1.4">${t}</span></div>
      `).join('')}
    </div>
    <div class="warn-card">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#92400e;margin-bottom:6px">⚠️ No van acá</div>
      <div style="font-size:13px;color:#713f12;line-height:1.6">
        <strong>Tarjetas</strong> (nafta en TC, streaming, cuotas) → van en Tarjetas Fede/Dai.<br>
        <strong>Niñera, jardín, expensas</strong> → van en Casa/Cata.<br>
        Solo lo que se paga en <strong>efectivo, débito o MP</strong>.
      </div>
    </div>
    <div style="height:10px"></div>
  `;
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
if (usuarioActivo) {
  sheetsInitHeader()
    .then(() => syncLoad())
    .catch(() => { gastos=[]; render(); });
  startAutoSync();
} else {
  renderLogin();
}
</script>
